православный_свято-тихоновский_гуманитар:
  type: book
  title: "Искусство Церкви: факультет Церковных художеств Православного Свято-Тихоновского гуманитарного университета. 1992-2007"
  publisher: "Православный Свято-Тихоновский гуманитарный университет (ПСТГУ), Москва"
  serial-number:
    isbn: "978-5-7429-0288-1"
  url:
    value: https://zyorna.ru/catalog/item/iskusstvo-cerkvi-fakultet-cerkovnyh-hudozhestv-pravoslavnogo-svyato-tihonovskogo-gumanitarnogo-universiteta-1992-2007-82221
    date: 2021-11-09
  abstract: "«Искусство Церкви» — это большая книга-альбом Факультет Церковных художеств Православного Свято-Тихоновского Гуманитарного Университета с работами студентов и преподавателей.\nФакультет Церковных художеств Православного Свято-Тихоновского Гуманитарного Университета является одним из первостепенных центров подготовки профессиональных специалистов во всех областях церковного изобразительного искусства: иконописи, монументальном искусстве, реставрации, церковном шитье и искусствоведении. Уникальность обучения на факультете состоит в том, что студенты получают богословское образование, что позволяет подготовить специалистов, сочетающих профессиональные навыки с пониманием специфики церковного искусства, определяемой прежде всего его литургическим назначением.\nВ данном альбоме собраны лучшие образцы работ преподавателей и студентов всех пяти выпускающих кафедр факультета, а также информация о деятельности научного отдела факультета «Компьютерная база данных памятников восточнохристианского искусства»."
  note: "Catalog: Библиотека Свято-Троицкого Данилова монастыря"

